# Desarrollo local: Postgres + API EduPlay
# Uso: docker compose up -d
# Variables: JWT_SECRET (obligatoria para api), API_HOST_PORT (default 3800), AUTO_SEED_DEMO (default false)
services:
  db:
    image: postgres:16-alpine
    container_name: eduplay-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: eduplay
      POSTGRES_PASSWORD: ${DB_PASSWORD:-eduplay2024}
      POSTGRES_DB: eduplay
    ports:
      - "5432:5432"
    volumes:
      - eduplay_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eduplay -d eduplay"]
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: eduplay-api
    restart: unless-stopped
    ports:
      - "${API_HOST_PORT:-3800}:3000"
    environment:
      DATABASE_URL: postgresql://eduplay:${DB_PASSWORD:-eduplay2024}@db:5432/eduplay?schema=public
      JWT_SECRET: ${JWT_SECRET:-local-docker-jwt-secret-change-me-32chars-min}
      NODE_ENV: production
      AUTO_SEED_DEMO: ${AUTO_SEED_DEMO:-false}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-*}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:3000/api/health >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  eduplay_pgdata:
