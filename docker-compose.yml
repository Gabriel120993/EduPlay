name: EduPlay

services:
  db:
    image: postgres:16-alpine
    container_name: EduPlay-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: eduplay
    ports:
      - "5432:5432"
    volumes:
      - eduplay_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d eduplay"]
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: EduPlay-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://postgres:postgres@db:5432/eduplay?schema=public
      JWT_SECRET: ${JWT_SECRET:-cambia-este-jwt-secret-por-uno-muy-largo-y-seguro}
      BCRYPT_ROUNDS: ${BCRYPT_ROUNDS:-12}
      TRUST_PROXY: ${TRUST_PROXY:-false}
      APPLE_IAP_SHARED_SECRET: ${APPLE_IAP_SHARED_SECRET:-}
      GOOGLE_PLAY_SERVICE_ACCOUNT_JSON: ${GOOGLE_PLAY_SERVICE_ACCOUNT_JSON:-}
      GOOGLE_PLAY_PACKAGE_NAME: ${GOOGLE_PLAY_PACKAGE_NAME:-}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:-}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-}
      CLOUDINARY_UPLOAD_FOLDER: ${CLOUDINARY_UPLOAD_FOLDER:-eduplay}
      CLOUDINARY_MODERATION: ${CLOUDINARY_MODERATION:-}
    ports:
      - "${API_HOST_PORT:-3800}:3000"

volumes:
  eduplay_db_data:
