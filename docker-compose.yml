# PostgreSQL local para EduPlay (desarrollo).
# Uso: docker compose up -d db
services:
  db:
    image: postgres:16-alpine
    container_name: eduplay-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: eduplay
      POSTGRES_PASSWORD: eduplay2024
      POSTGRES_DB: eduplay
    ports:
      - "5432:5432"
    volumes:
      - eduplay_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eduplay -d eduplay"]
      interval: 3s
      timeout: 5s
      retries: 20

volumes:
  eduplay_pgdata:
